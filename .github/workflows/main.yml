name: Flutter Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Java einrichten
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Flutter einrichten
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'

    - name: WebView-Modul laden
      run: |
        cd m1_app
        flutter pub get

    - name: APK im M1-Ordner bauen
      run: |
        cd m1_app
        flutter build apk --release

    - name: APK als Download bereitstellen
      uses: actions/upload-artifact@v4
      with:
        name: Radio-M1-App
        path: m1_app/build/app/outputs/flutter-apk/app-release.apk
